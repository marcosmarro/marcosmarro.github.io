function renderLayout() {
  const n = G.players.length;
  const opponents = G.players.filter(p => !p.isLocalPlayer);
  const container = document.getElementById('opponent-areas-container');
  container.innerHTML = '';
  
  // Opponent areas sit flush at their edge.
  // Corner seats hang off TWO edges simultaneously (top+left, top+right).
  const layouts = {
    2: [
      { top: '0', left: '50%', transform: 'translateX(-50%)' }
    ],
    3: [
      { top: '50%', left: '0', transform: 'translateY(-50%)' },
      { top: '50%', right: '0', left: 'auto', transform: 'translateY(-50%)' }
    ],
    4: [
      { top: '50%', left: '0', transform: 'translateY(-50%)' },
      { top: '0',   left: '50%', transform: 'translateX(-50%)' },
      { top: '50%', right: '0', left: 'auto', transform: 'translateY(-50%)' }
    ],
    // 5p: left (shifted down), top-left corner, top-right corner, right (shifted down)
    5: [
      { top: '65%', left: '0', transform: 'translateY(-50%)' },
      { top: '0',   left: '0' },
      { top: '0',   right: '0', left: 'auto' },
      { top: '65%', right: '0', left: 'auto', transform: 'translateY(-50%)' }
    ],
    // 6p: left-upper, left-lower, top, right-upper, right-lower
    6: [
      { top: '30%', left: '0', transform: 'translateY(-50%)' },
      { top: '70%', left: '0', transform: 'translateY(-50%)' },
      { top: '0',   left: '50%', transform: 'translateX(-50%)' },
      { top: '30%', right: '0', left: 'auto', transform: 'translateY(-50%)' },
      { top: '70%', right: '0', left: 'auto', transform: 'translateY(-50%)' }
    ]
  };

  // seat labels in clockwise order
  const seatLabels = {
    2: ['top'],
    3: ['left','right'],
    4: ['left','top','right'],
    5: ['left','corner-tl','corner-tr','right'],
    6: ['left','left','top','right','right']
  };
  const seats = seatLabels[n] || seatLabels[2];

  const positions = layouts[n] || layouts[2];

  opponents.forEach((p, i) => {
    const pos = positions[i % positions.length];
    const seat = seats[i % seats.length]; // 'left','top','right', etc.
    const seatClass = seat === 'left'      ? 'seat-left'
                    : seat === 'right'     ? 'seat-right'
                    : seat === 'corner-tl' ? 'seat-corner-tl'
                    : seat === 'corner-tr' ? 'seat-corner-tr'
                    : 'seat-top';

    const area = document.createElement('div');
    area.className = 'opponent-area ' + seatClass;
    area.id = 'opponent_' + p.id;
    area.dataset.seat = seat;

    Object.entries(pos).forEach(([k, v]) => area.style[k] = v);

    const isActive = G.players[G.currentTurn]?.id === p.id;

    const cardsEl = document.createElement('div');
    cardsEl.className = 'opponent-cards';
    cardsEl.id = 'opp-cards-' + p.id;
    cardsEl.dataset.seat = seat;

    // Name label: positioned inward (toward center) from the card strip
    const nameEl = document.createElement('div');
    nameEl.className = 'opponent-name' + (isActive ? ' active-turn' : '') + (p.wentOut ? ' went-out' : '');
    const oppRoundScore = (G.phase === 'roundEnd' || p.finishedLastTurn)
      ? (p.wentOut ? 0 : scoreHand(p.hand))
      : null;
    nameEl.textContent = p.name + (p.wentOut ? ' ✓' : '') +
      (oppRoundScore !== null ? ` · ${oppRoundScore}` : '');
    nameEl.id = 'opp-name-' + p.id;

    // Position name inward — JS will set exact coords after cards render,
    // but we set a data attribute so renderOpponentCards can place it.
    nameEl.dataset.seatFor = seat;

    area.appendChild(cardsEl);
    area.appendChild(nameEl);
    container.appendChild(area);
  });
}



function renderGame() {
  renderLayout(); // re-render positions
  renderOpponentCards();
  renderPlayerHand();
  updatePlayerLabel();
  renderPiles();
  updateTopBar();
  updateActionButtons();
  updateScoresPanel();
}

function renderOpponentCards() {
  G.players.forEach(p => {
    if (p.isLocalPlayer) return;
    const el = document.getElementById('opp-cards-' + p.id);
    if (!el) return;
    el.innerHTML = '';

    const revealed = p.finishedLastTurn || G.phase === 'roundEnd';
    const wasRevealed = G.revealedSet.has(p.id);

    // First time revealed: animate the flip after DOM updates
    if (revealed && !wasRevealed) {
      G.revealedSet.add(p.id);
    }
    const seat = el.dataset.seat || 'top';
    const n = p.hand.length;
    if (n === 0) { el.style.cssText = 'width:0;height:0'; return; }

    const CW = 70, CH = 100;
    const SIDE_CW = 70, SIDE_CH = 100;
    const CROP = 0.20;
    const isSide = seat === 'left' || seat === 'right';
    const isCorner = seat === 'corner-tl' || seat === 'corner-tr';

    const maxSpread = Math.min(6, n * 0.7);
    const aStep  = n > 1 ? maxSpread / (n - 1) : 0;
    const aStart = -maxSpread / 2;

    if (seat === 'top') {
      const availW = Math.min(window.innerWidth * 0.44, 240);
      const idealStep = Math.round(CW * 0.26);
      const maxStep = n <= 1 ? CW : Math.floor((availW - CW) / (n - 1));
      const step = Math.min(idealStep, maxStep);
      const totalW = n <= 1 ? CW : step * (n - 1) + CW;
      const hidden = Math.round(CH * CROP);
      el.style.cssText = `position:relative; overflow:visible; width:${totalW}px; height:${CH - hidden}px;`;
      const ARC_R = 500;
      const angleDeg = 2;
      const topStartAngleDeg = ((n - 1) / 2) * angleDeg; // start positive, sweep to negative
      p.hand.forEach((card, idx) => {
        const θDeg = topStartAngleDeg - idx * angleDeg;
        const θRad = θDeg * Math.PI / 180;
        // For top cards, arc bows downward (away from edge): center cards drop more
        const yOffset = -(ARC_R - ARC_R * Math.cos(θRad)); // negative = up into screen edge
        const div = createMiniCardElement(card, !revealed);
        div.style.cssText = `position:absolute; width:${CW}px; height:${CH}px; left:${idx * step}px; top:${-hidden + yOffset}px; z-index:${n - idx}; transform-origin:top center; transform:rotate(${θDeg}deg);`;
        el.appendChild(div);
      });

    } else if (isSide) {
      const isLeft = seat === 'left';
      const visibleW = Math.round(SIDE_CH * (1 - CROP));
      const availH = Math.min(window.innerHeight * 0.50, 260);
      const idealStep = Math.round(SIDE_CW * 0.26);
      const maxStep = n <= 1 ? SIDE_CW : Math.floor((availH - SIDE_CW) / (n - 1));
      const step = Math.min(idealStep, maxStep);
      const totalH = n <= 1 ? SIDE_CW : step * (n - 1) + SIDE_CW;
      el.style.cssText = `position:relative; overflow:visible; width:${visibleW}px; height:${totalH}px;`;

      const sideMaxSpread = 2 * (n - 1);
      const sideAngleStep = n > 1 ? sideMaxSpread / (n - 1) : 0;
      const sideStartAngle = n > 1 ? -sideMaxSpread / 2 : 0;
      const ARC_R = 500;
      const centerIdx = (n - 1) / 2;

      p.hand.forEach((card, idx) => {
        const fanAngle = sideStartAngle + idx * sideAngleStep;
        const div = createMiniCardElement(card, !revealed);
        const directedFan = isLeft ? fanAngle : -fanAngle;
        const baseAngle = isLeft ? 90 : -90;
        const centerFromWall = visibleW - SIDE_CH / 2;
        // Arc: center card bows furthest inward, edges pull back
        const distFromCenter = idx - centerIdx;
        const θRad = (distFromCenter * sideAngleStep) * Math.PI / 180;
        const arcInset = ARC_R - ARC_R * Math.cos(θRad);
        const adjustedCenter = centerFromWall - arcInset; // subtract = pull edge cards back
        const left = isLeft
          ? adjustedCenter - SIDE_CW / 2
          : visibleW - adjustedCenter - SIDE_CW / 2;
        const cardCenterY = idx * step + SIDE_CW / 2;
        const top  = cardCenterY - SIDE_CH / 2;
        const zIndex = isLeft ? (idx + 1) : (n - idx);
        div.style.cssText = `position:absolute; width:${SIDE_CW}px; height:${SIDE_CH}px; left:${left}px; top:${top}px; z-index:${zIndex}; transform-origin:center center; transform:rotate(${baseAngle + directedFan}deg);`;
        el.appendChild(div);
      });

    } else if (isCorner) {
      const isLeft2 = seat === 'corner-tl';
      const angStep2 = 10;
      const totalSpread2 = angStep2 * (n - 1);
      const centerAngle = isLeft2 ? 45 : 135;
      const startAngle = centerAngle - totalSpread2 / 2;
      const BASE_R = 20, R = BASE_R + n * 10;
      const cardDiag = Math.round(Math.sqrt(CW * CW + CH * CH));
      const containerSize = R + cardDiag + 8;
      el.style.cssText = `position:relative; overflow:visible; width:${containerSize}px; height:${containerSize}px;`;
      p.hand.forEach((card, idx) => {
        const dirAngle = startAngle + idx * angStep2;
        const dirRad = dirAngle * Math.PI / 180;
        const cardAngle = dirAngle + (isLeft2 ? 90 : -90);
        const originX = isLeft2 ? 0 : containerSize;
        const cx = originX + R * Math.cos(dirRad) - CW / 2;
        const cy = R * Math.sin(dirRad) - CH / 2;
        const div = createMiniCardElement(card, !revealed);
        div.style.cssText = `position:absolute; width:${CW}px; height:${CH}px; left:${cx}px; top:${cy}px; z-index:${idx + 1}; transform-origin:center center; transform:rotate(${cardAngle}deg);`;
        el.appendChild(div);
      });
    }

    // Stagger-flip newly revealed cards after they're in the DOM
    if (revealed && !wasRevealed) {
      const container = document.getElementById('opp-cards-' + p.id);
      setTimeout(() => flipRevealCards(container), 50);
    }

    // Name label
    // The opponent-area itself is positioned at the screen edge, so we just
    // place the name at a fixed offset that works for each seat direction.
    const nameEl = document.getElementById('opp-name-' + p.id);
    if (nameEl) {
      if (seat === 'left') {
        nameEl.style.cssText = 'position:absolute; top:-20px; left:0; white-space:nowrap;';
      } else if (seat === 'right') {
        nameEl.style.cssText = 'position:absolute; top:-20px; right:0; left:auto; white-space:nowrap;';
      } else if (seat === 'corner-tl') {
        nameEl.style.cssText = 'position:absolute; top:4px; left:4px; white-space:nowrap; z-index:20;';
      } else if (seat === 'corner-tr') {
        nameEl.style.cssText = 'position:absolute; top:4px; right:4px; left:auto; white-space:nowrap; z-index:20;';
      } else {
        // top: name below cards
        nameEl.style.cssText = 'position:absolute; top:calc(100% + 8px); left:50%; transform:translateX(-50%); white-space:nowrap;';
      }
    }
  });
}


function updatePlayerLabel() {
  const el = document.getElementById('player-label');
  if (!el) return;
  const localPlayer = G.players[G.localPlayerIdx];
  if (!localPlayer) return;

  // If a card is previewed for discard, score the hand without it
  const scoringHand = G.selectedCardIdx >= 0
    ? localPlayer.hand.filter((_, i) => i !== G.selectedCardIdx)
    : localPlayer.hand;
  const roundScore = scoreHand(scoringHand);
  const isRoundEnd = G.phase === 'roundEnd';

  if (isRoundEnd && localPlayer.wentOut) {
    el.innerHTML = `<span style="color:var(--gold)">${localPlayer.name}</span> <span style="color:rgba(255,255,255,0.4)">· went out · 0</span>`;
  } else {
    const pts = roundScore;
    const color = pts === 0 ? 'var(--green-light)' : pts <= 10 ? 'var(--gold)' : 'rgba(255,255,255,0.5)';
    el.innerHTML = `<span style="color:var(--gold)">${localPlayer.name}</span> <span style="color:${color}">· ${pts}</span>`;
  }
}

function renderPlayerHand() {
  // Never blow away the hand while a drag is in progress
  if (dragState) return;
  const hand = document.getElementById('player-hand');
  const localPlayer = G.players[G.localPlayerIdx];
  if (!localPlayer) return;

  hand.innerHTML = '';

  const CARD_W = 70;
  const n = localPlayer.hand.length;

  const maxWidth = window.innerWidth - 32;
  let step;
  if (n <= 1) {
    step = CARD_W;
  } else {
    const idealStep = Math.round(CARD_W * 0.26);
    const maxStep = Math.floor((maxWidth - CARD_W) / (n - 1));
    step = Math.min(idealStep, maxStep);
  }

  const CARD_H = 100;

  const totalWidth = n <= 1 ? CARD_W : step * (n - 1) + CARD_W;
  hand.style.width = totalWidth + 'px';
  hand.style.height = CARD_H + 'px';

  // Place cards on a large circle arc so center cards sit highest.
  // R = circle radius — larger = flatter arc. 800px gives a gentle curve.
  const R = 500;
  const angleDeg = 2; // degrees between each card
  const startAngleDeg = -((n - 1) / 2) * angleDeg; // centered at 0°

  localPlayer.hand.forEach((card, idx) => {
    const isRoundOver = localPlayer.finishedLastTurn || G.phase === 'roundEnd';
    const div = createCardElement(card, idx, !!card.faceDown);
    div.setAttribute('data-idx', idx);
    div.setAttribute('data-hand', 'true');

    const θDeg = startAngleDeg + idx * angleDeg;
    const θRad = θDeg * Math.PI / 180;

    // Position along the arc: x from circle geometry, y drops as |θ| increases
    const x = idx * step;
    const yOffset = R - R * Math.cos(θRad); // 0 at center, positive (down) at edges

    div.style.left = x + 'px';
    div.style.top  = yOffset + 'px';
    div.style.transform = `rotate(${θDeg}deg)`;
    div.style.transformOrigin = 'bottom center';
    div.style.zIndex = idx + 1;

    if (idx === G.selectedCardIdx && !dragState) div.style.opacity = '0';

    if (!localPlayer.finishedLastTurn && G.phase !== 'roundEnd') {
      div.addEventListener('click', () => {
        if (isMyTurn() && G.drawnCard !== null) {
          tapCardToDiscard(idx);
        } else {
          card.faceDown = !card.faceDown;
          renderPlayerHand();
        }
      });
      div.addEventListener('mousedown', startDrag);
      div.addEventListener('touchstart', startDrag, { passive: false });
    } else if (G.phase === 'roundEnd') {
      // During round end, still allow flipping cards to show everyone
      div.addEventListener('click', () => {
        card.faceDown = !card.faceDown;
        renderPlayerHand();
      });
    }

    hand.appendChild(div);
  });
}

// Joker letter colors: J=clubs(green), O=hearts(red), K=spades(black), E=stars(yellow), R=diamonds(blue)
const JOKER_LETTER_CLASSES = ['jc-0','jc-1','jc-2','jc-3','jc-4'];
const JOKER_LETTERS = ['J','O','K','E','R'];

function buildPip(card, isLarge) {
  // Returns a document fragment with .cp.tl and .cp.br elements
  const frag = document.createDocumentFragment();

  function makePip(corner) {
    const pip = document.createElement('div');
    pip.className = 'cp ' + corner;

    if (card.isJoker) {
      // Vertical JOKER, each letter a different suit color
      const col = document.createElement('div');
      col.className = 'cp-joker';
      const fs = '9px';
      JOKER_LETTERS.forEach((letter, i) => {
        const span = document.createElement('span');
        span.className = JOKER_LETTER_CLASSES[i];
        span.style.fontSize = fs;
        span.textContent = letter;
        col.appendChild(span);
      });
      pip.appendChild(col);
    } else {
      const val = document.createElement('div');
      val.className = 'cp-val';
      val.style.fontSize = '13px';
      val.textContent = card.val;

      const suit = document.createElement('div');
      suit.className = 'cp-suit';
      suit.style.fontSize = '10px';
      suit.textContent = SUIT_SYMBOLS[card.suit] || '';

      pip.appendChild(val);
      pip.appendChild(suit);
    }
    return pip;
  }

  frag.appendChild(makePip('tl'));
  frag.appendChild(makePip('br'));
  return frag;
}

// Full-size card. faceDown=true shows green back.
function createCardElement(card, idx, faceDown = false) {
  const el = document.createElement('div');
  el.className = 'card ' + getSuitClass(card) + (isWild(card) ? ' wild-card' : '') + (faceDown ? ' face-down' : '');
  if (!faceDown) el.appendChild(buildPip(card, true));
  return el;
}

// Mini card for opponent areas. faceDown=true shows green back.
function createMiniCardElement(card, faceDown = false) {
  const el = document.createElement('div');
  el.className = 'opp-card-mini ' + getSuitClass(card) + (isWild(card) ? ' wild-card' : '') + (faceDown ? ' face-down' : '');
  if (!faceDown) el.appendChild(buildPip(card, false));
  return el;
}

function flipCard(el, faceDown, animate = true) {
  el.classList.toggle('face-down', faceDown);
}

function flipRevealCards(containerEl, delayMs = 0) {
  if (!containerEl) return;
  containerEl.querySelectorAll('.opp-card-mini, .card').forEach((card, idx) => {
    setTimeout(() => card.classList.remove('face-down'), delayMs + idx * 80);
  });
}

function flipRevealPlayerHand(delayMs = 0) {
  const hand = document.getElementById('player-hand');
  if (!hand) return;
  hand.querySelectorAll('.card').forEach((card, idx) => {
    setTimeout(() => card.classList.remove('face-down'), delayMs + idx * 80);
  });
}

function getSuitClass(card) {
  if (card.isJoker) return 'suit-joker';
  if (isWild(card)) return 'suit-wild';
  return 'suit-' + card.suit;
}

function getSuitSymbol(card) {
  if (card.isJoker) return '';
  return SUIT_SYMBOLS[card.suit] || card.suit;
}

function renderPiles() {
  const discardDisplay = document.getElementById('discard-pile-display');

  // If a preview card is currently sitting on the pile, don't wipe it
  const hasPreview = !!document.getElementById('discard-preview-card');

  discardDisplay.innerHTML = '';

  const topDiscard = G.discardPile[G.discardPile.length - 1];
  if (topDiscard) {
    const el = createCardElement(topDiscard, -1);
    el.className += ' large';
    el.style.position = 'absolute';
    el.style.top = '0'; el.style.left = '0';
    if ((G.phase === 'draw' || G.phase === 'lastTurns') && isMyTurn() && !G.drawnCard) {
      el.style.cursor = 'pointer';
      el.onclick = () => drawFromDiscard();
    }
    discardDisplay.appendChild(el);
  } else {
    const placeholder = document.createElement('div');
    placeholder.style.cssText = 'width:50px;height:70px;border:2px dashed rgba(255,255,255,0.15);border-radius:7px;';
    discardDisplay.appendChild(placeholder);
  }

  // Re-attach the preview card on top if it was there before the re-render
  if (hasPreview && G.selectedCardIdx >= 0) {
    const localPlayer = G.players[G.localPlayerIdx];
    const card = localPlayer.hand[G.selectedCardIdx];
    if (card) {
      const preview = createCardElement(card, -1);
      preview.id = 'discard-preview-card';
      preview.className += ' large';
      preview.style.cssText = `
        position:absolute; top:0; left:0;
        transform: rotate(3deg);
        outline: 3px solid var(--gold);
        box-shadow: 0 0 18px rgba(200,148,10,0.7), 0 4px 16px rgba(0,0,0,0.5);
        z-index: 10;
      `;
      discardDisplay.appendChild(preview);
    }
  }
}

function updateTopBar() {
  const currentPlayer = G.players[G.currentTurn];
  // Turn label above piles
  const turnEl = document.getElementById('center-turn-label');
  if (turnEl) {
    turnEl.textContent = currentPlayer
      ? (isMyTurn() ? '⭐ Your Turn' : `${currentPlayer.name}'s Turn`)
      : '';
  }
  // Round + wild info in scores title
  const wv = wildValue();
  const wildName = wv === 'K' ? 'Kings' : wv === 'Q' ? 'Queens' : wv === 'J' ? 'Jacks' : wv + 's';
}

function updateActionButtons() {
  // Don't touch buttons during roundEnd — endRound() manages them directly
  if (G.phase === 'roundEnd') return;

  const localPlayer = G.players[G.localPlayerIdx];
  const myTurn = isMyTurn();
  const hasDrawn = G.drawnCard !== null;
  const hasSelected = G.selectedCardIdx >= 0;
  const anyoneWentOut = G.players.some(p => p.wentOut);

  // Show/hide entire action area — always visible but buttons disabled when not your turn
  // Buttons are always visible in layout — just enable/disable them

  // Continue: enabled only when a card is selected to discard
  const continueBtn = document.getElementById('continue-btn');
  continueBtn.disabled = !(myTurn && hasDrawn && hasSelected);

  // Undo: enabled only when a card is selected (deselects it)
  const undoBtn = document.getElementById('undo-btn');
  undoBtn.disabled = !(myTurn && hasSelected);

  // Go Out: only enabled when a card is selected AND removing it leaves a valid hand
  const goOutBtn = document.getElementById('go-out-btn');
  const someoneElseWentOut = G.players.some(p => p.wentOut && !p.isLocalPlayer);
  let canGoOut = false;
  if (myTurn && hasDrawn && hasSelected && !someoneElseWentOut) {
    const remaining = localPlayer.hand.filter((_, i) => i !== G.selectedCardIdx);
    canGoOut = isValidHand(remaining);
  }
  goOutBtn.disabled = !canGoOut;
  goOutBtn.title = !myTurn ? "Not your turn"
    : !hasDrawn ? "Draw a card first"
    : !hasSelected ? "Select a card to discard first"
    : someoneElseWentOut ? "Someone already went out"
    : !canGoOut ? "Can't go out with that discard"
    : "";
}

function updateScoresPanel() {
  const rows = document.getElementById('center-scores-rows');
  if (!rows) return;
  rows.innerHTML = '';
  const sorted = [...G.players].sort((a, b) => a.score - b.score);
  sorted.forEach(p => {
    const isActive = G.players[G.currentTurn]?.id === p.id;
    const row = document.createElement('div');
    row.className = 'cscore-row' +
      (p.isLocalPlayer ? ' me' : '') +
      (isActive ? ' active-score' : '');
    row.innerHTML = `<span class="cscore-name">${p.name}</span><span class="cscore-pts">${p.score}</span>`;
    rows.appendChild(row);
  });
}

// toggleScores removed — scores always visible inline

function isMyTurn() {
  return G.players[G.currentTurn]?.isLocalPlayer === true;
}

// ========================
// DRAWING CARDS
// ========================
function drawFromDeck() {
  if (!isMyTurn() || G.drawnCard !== null || (G.phase !== 'draw' && G.phase !== 'lastTurns')) return;
  if (G.deck.length === 0) {
    const top = G.discardPile.pop();
    G.deck = shuffle([...G.discardPile]);
    G.discardPile = top ? [top] : [];
    showToast('Reshuffled discard pile!');
  }
  if (G.deck.length === 0) { showToast('No cards left!'); return; }

  const card = G.deck.pop();
  G.drawnCard = card;
  G.drawnFromDiscard = false;

  const fromEl = document.getElementById('draw-pile-visual');
  const toEl   = document.getElementById('player-hand');
  if (fromEl && toEl) {
    animateCardDraw(fromEl, toEl, false, card, () => {
      G.players[G.localPlayerIdx].hand.push(card);
      renderGame();
    });
  } else {
    G.players[G.localPlayerIdx].hand.push(card);
    renderGame();
  }
}

function drawFromDiscard() {
  if (!isMyTurn() || G.drawnCard !== null || (G.phase !== 'draw' && G.phase !== 'lastTurns')) return;
  if (G.discardPile.length === 0) { showToast('Discard pile is empty!'); return; }

  const card = G.discardPile.pop();
  G.drawnCard = card;
  G.drawnFromDiscard = true;

  const fromEl = document.getElementById('discard-drop-target');
  const toEl   = document.getElementById('player-hand');
  if (fromEl && toEl) {
    animateCardDraw(fromEl, toEl, true, card, () => {
      G.players[G.localPlayerIdx].hand.push(card);
      renderGame();
    });
  } else {
    G.players[G.localPlayerIdx].hand.push(card);
    renderGame();
  }
}

// ========================
// DISCARD — tap flies card to pile, Continue commits, Undo flies it back
// ========================

// Removes any existing preview element from the discard pile display
function clearDiscardPreview() {
  const existing = document.getElementById('discard-preview-card');
  if (existing) existing.remove();
}

function tapCardToDiscard(cardIdx) {
  if (!isMyTurn() || G.drawnCard === null) return;

  // Tapping the already-selected card → undo the preview
  if (G.selectedCardIdx === cardIdx) {
    undoDiscard();
    return;
  }

  // If a different card was already previewed, fly it back first, then preview new one
  if (G.selectedCardIdx >= 0) {
    flyCardBackToHand(G.selectedCardIdx, () => {
      G.selectedCardIdx = -1;
      renderPlayerHand();
      flyCardToDiscardPreview(cardIdx);
    });
    return;
  }

  flyCardToDiscardPreview(cardIdx);
}

function flyCardToDiscardPreview(cardIdx) {
  const localPlayer = G.players[G.localPlayerIdx];
  const card = localPlayer.hand[cardIdx];
  if (!card) return;

  const hand = document.getElementById('player-hand');
  const cardEls = hand.querySelectorAll('.card');
  const cardEl = cardEls[cardIdx];
  const discardTarget = document.getElementById('discard-drop-target');
  if (!cardEl || !discardTarget) return;

  const fromRect = cardEl.getBoundingClientRect();
  const toRect   = discardTarget.getBoundingClientRect();

  // Build flying clone
  const flyCard = cardEl.cloneNode(true);
  flyCard.style.cssText = `
    position:fixed;
    width:${fromRect.width}px; height:${fromRect.height}px;
    left:${fromRect.left}px; top:${fromRect.top}px;
    z-index:9998; pointer-events:none;
    transform: rotate(0deg) scale(1);
    opacity: 1;
    transition: left 0.3s cubic-bezier(0.4,0,0.2,1),
                top 0.3s cubic-bezier(0.4,0,0.2,1),
                transform 0.3s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  `;
  document.body.appendChild(flyCard);

  // Hide the original in the hand
  cardEl.style.opacity = '0';
  G.selectedCardIdx = cardIdx;
  updateActionButtons();
  updatePlayerLabel();

  flyCard.getBoundingClientRect(); // force reflow

  const destLeft = toRect.left + (toRect.width  - fromRect.width)  / 2;
  const destTop  = toRect.top  + (toRect.height - fromRect.height) / 2;
  flyCard.style.left      = destLeft + 'px';
  flyCard.style.top       = destTop  + 'px';
  flyCard.style.transform = 'rotate(3deg) scale(1)';

  setTimeout(() => {
    document.body.removeChild(flyCard);
    // Place a static preview card on the discard pile
    clearDiscardPreview();
    const preview = createCardElement(card, -1);
    preview.id = 'discard-preview-card';
    preview.className += ' large';
    preview.style.cssText = `
      position:absolute; top:0; left:0;
      transform: rotate(3deg);
      outline: 3px solid var(--gold);
      box-shadow: 0 0 18px rgba(200,148,10,0.7), 0 4px 16px rgba(0,0,0,0.5);
      z-index: 10;
    `;
    document.getElementById('discard-pile-display').appendChild(preview);

    // During last turns, flip the local player's remaining hand face-up
    // so all players can see what they're keeping before they confirm
    if (G.phase === 'lastTurns' && !G.revealedSet.has('local_hand')) {
      G.revealedSet.add('local_hand');
      G.players[G.localPlayerIdx].hand.forEach(c => c.faceDown = false);
      renderPlayerHand();
      flipRevealPlayerHand(50);
    }
  }, 310);
}

function flyCardBackToHand(cardIdx, callback) {
  clearDiscardPreview();

  const hand = document.getElementById('player-hand');
  const cardEls = hand.querySelectorAll('.card');
  const cardEl = cardEls[cardIdx];
  const discardTarget = document.getElementById('discard-drop-target');
  if (!cardEl || !discardTarget) { if (callback) callback(); return; }

  const toRect   = cardEl.getBoundingClientRect();
  const fromRect = discardTarget.getBoundingClientRect();

  const localPlayer = G.players[G.localPlayerIdx];
  const card = localPlayer.hand[cardIdx];

  const flyCard = createCardElement(card, -1);
  flyCard.className += ' large';
  flyCard.style.cssText = `
    position:fixed;
    width:50px; height:70px;
    left:${fromRect.left + (fromRect.width - 50) / 2}px;
    top:${fromRect.top  + (fromRect.height - 70) / 2}px;
    z-index:9998; pointer-events:none;
    transform: rotate(3deg) scale(1);
    opacity: 1;
    transition: left 0.3s cubic-bezier(0.4,0,0.2,1),
                top 0.3s cubic-bezier(0.4,0,0.2,1),
                transform 0.3s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  `;
  document.body.appendChild(flyCard);

  flyCard.getBoundingClientRect();

  flyCard.style.left      = toRect.left + 'px';
  flyCard.style.top       = toRect.top  + 'px';
  flyCard.style.transform = 'rotate(0deg) scale(1)';

  setTimeout(() => {
    document.body.removeChild(flyCard);
    if (cardEl) cardEl.style.opacity = '';
    if (callback) callback();
  }, 310);
}

function confirmDiscard() {
  if (!isMyTurn() || G.drawnCard === null || G.selectedCardIdx < 0) return;
  const localPlayer = G.players[G.localPlayerIdx];
  const card = localPlayer.hand[G.selectedCardIdx];
  if (!card) return;

  clearDiscardPreview();
  localPlayer.hand.splice(G.selectedCardIdx, 1);
  G.discardPile.push(card);
  G.drawnCard = null;
  G.selectedCardIdx = -1;
  advanceTurn();
  renderGame();
}

function undoDiscard() {
  if (!isMyTurn() || G.selectedCardIdx < 0) return;
  const idx = G.selectedCardIdx;
  flyCardBackToHand(idx, () => {
    G.selectedCardIdx = -1;
    renderPlayerHand();
    updateActionButtons();
    updatePlayerLabel();
  });
}


// ========================
// GO OUT
// ========================
function canPlayerGoOut(player) {
  const hand = player.hand;
  if (hand.length < 2) return false;
  for (let i = 0; i < hand.length; i++) {
    const remaining = hand.filter((_, idx) => idx !== i);
    if (isValidHand(remaining)) return true;
  }
  return false;
}

function tryGoOut() {
  const localPlayer = G.players[G.localPlayerIdx];
  if (!canPlayerGoOut(localPlayer)) {
    showToast('❌ Cannot go out yet!', 2500);
    return;
  }

  // Use selected card as discard; if none selected, auto-find best
  let discardIdx = G.selectedCardIdx >= 0 ? G.selectedCardIdx : -1;
  if (discardIdx < 0) {
    for (let i = 0; i < localPlayer.hand.length; i++) {
      const remaining = localPlayer.hand.filter((_, idx) => idx !== i);
      if (isValidHand(remaining)) { discardIdx = i; break; }
    }
  } else {
    // Verify selected card is actually a valid discard
    const remaining = localPlayer.hand.filter((_, idx) => idx !== discardIdx);
    if (!isValidHand(remaining)) {
      showToast('❌ That card cannot be your discard — pick another', 2500);
      return;
    }
  }

  clearDiscardPreview();
  const card = localPlayer.hand[discardIdx];
  localPlayer.hand.splice(discardIdx, 1);
  G.discardPile.push(card);
  G.drawnCard = null;
  G.selectedCardIdx = -1;

  localPlayer.wentOut = true;
  localPlayer.finishedLastTurn = true;
  G.revealedSet.add('local_hand');
  localPlayer.hand.forEach(c => c.faceDown = false);
  G.lastTurnPlayer = G.currentTurn;
  G.phase = 'lastTurns';
  G.lastTurnCount = 0;

  showWentOut(localPlayer.name);
  renderGame();
  flipRevealPlayerHand(300); // flip after wentOut overlay appears
  setTimeout(beginLastTurns, 1500);
}

function isValidHand(cards) {
  if (cards.length === 0) return true;
  // Try all partitions into groups of 3+
  return canArrangeCards(cards);
}

function canArrangeCards(cards) {
  if (cards.length === 0) return true;
  if (cards.length < 3) return false;
  
  // Try forming a book or run starting with first non-wild card
  const wilds = cards.filter(c => isWild(c));
  const normals = cards.filter(c => !isWild(c));
  
  // BFS approach: try each possible group of 3+ cards
  return tryGroups(cards, 0);
}

function tryGroups(remaining, depth) {
  if (remaining.length === 0) return true;
  if (remaining.length < 3) return false;
  if (depth > 10) return false;
  
  const n = remaining.length;
  
  // Try all subsets of size 3 to n
  for (let size = 3; size <= n; size++) {
    const combos = getCombinations(remaining, size);
    for (const combo of combos) {
      if (isBook(combo) || isRun(combo)) {
        const rest = remaining.filter(c => !combo.includes(c));
        if (tryGroups(rest, depth + 1)) return true;
      }
    }
  }
  return false;
}

function getCombinations(arr, k) {
  if (k === arr.length) return [arr];
  if (k === 1) return arr.map(x => [x]);
  const result = [];
  for (let i = 0; i <= arr.length - k; i++) {
    const rest = getCombinations(arr.slice(i + 1), k - 1);
    for (const combo of rest) result.push([arr[i], ...combo]);
  }
  return result;
}

function isBook(cards) {
  const normals = cards.filter(c => !isWild(c));
  if (normals.length === 0) return true; // all wilds
  const val = normals[0].val;
  return normals.every(c => c.val === val);
}

function isRun(cards) {
  const normals = cards.filter(c => !isWild(c));
  if (normals.length === 0) return true;
  
  // All normals must be same suit
  const suit = normals[0].suit;
  if (!normals.every(c => c.suit === suit)) return false;
  
  const ranks = normals.map(c => cardNumericRank(c.val)).sort((a, b) => a - b);
  const wildCount = cards.length - normals.length;
  
  // Check if ranks can form a consecutive run with wildCount wilds filling gaps
  const span = ranks[ranks.length - 1] - ranks[0] + 1;
  if (span > cards.length) return false; // too spread out
  
  // Count gaps that need filling
  let gaps = 0;
  for (let i = 1; i < ranks.length; i++) {
    const diff = ranks[i] - ranks[i - 1];
    if (diff === 0) return false; // duplicate rank
    gaps += diff - 1;
  }
  
  return gaps <= wildCount;
}

// ========================
// TURN ADVANCEMENT
// ========================
function advanceTurn() {
  if (G.phase === 'lastTurns') {
    advanceTurnAfterGoOut();
    return;
  }
  
  G.currentTurn = (G.currentTurn + 1) % G.players.length;
  G.drawnCard = null;
  
  if (G.players[G.currentTurn].isBot) {
    renderGame();
    setTimeout(doBotTurn, 800 + Math.random() * 600);
  } else {
    renderGame();
  }
}

function advanceTurnAfterGoOut() {
  // Called when a player FINISHES their last turn (draw + discard completed).
  // Mark them as revealed, increment counter, then end or seat next player.
  G.players[G.currentTurn].finishedLastTurn = true;
  G.players[G.currentTurn].hand.forEach(c => c.faceDown = false);
  renderGame(); // flip their cards immediately
  G.lastTurnCount++;

  const othersCount = G.players.length - 1;
  if (G.lastTurnCount >= othersCount) {
    endRound();
    return;
  }

  // Move clockwise to the next player who hasn't gone out
  do {
    G.currentTurn = (G.currentTurn + 1) % G.players.length;
  } while (G.players[G.currentTurn].wentOut);

  G.drawnCard = null;

  if (G.players[G.currentTurn].isBot) {
    renderGame();
    setTimeout(doBotTurn, 600 + Math.random() * 400);
  } else {
    renderGame();
    showToast('Final turn! Draw then discard.');
  }
}

// Called once right after someone goes out — seats the FIRST player for their last turn
// without incrementing lastTurnCount (that happens when they finish).
function beginLastTurns() {
  const othersCount = G.players.length - 1;
  if (othersCount === 0) { endRound(); return; }

  // Move clockwise from the person who went out to the next active player
  do {
    G.currentTurn = (G.currentTurn + 1) % G.players.length;
  } while (G.players[G.currentTurn].wentOut);

  G.drawnCard = null;

  if (G.players[G.currentTurn].isBot) {
    renderGame();
    setTimeout(doBotTurn, 600 + Math.random() * 400);
  } else {
    renderGame();
    showToast('Final turn! Draw then discard.');
  }
}

// ========================
// BOT AI
// ========================
function doBotTurn() {
  const bot = G.players[G.currentTurn];
  if (!bot || !bot.isBot) return;

  // --- DRAW ---
  const topDiscard = G.discardPile[G.discardPile.length - 1];
  let shouldTakeDiscard = false;
  if (topDiscard) {
    const testHand = [...bot.hand, topDiscard];
    shouldTakeDiscard = botWouldBenefit(testHand, topDiscard);
  }

  let drawnCard;
  let fromDiscardPile = false;
  if (shouldTakeDiscard && G.discardPile.length > 0) {
    drawnCard = G.discardPile.pop();
    fromDiscardPile = true;
  } else {
    if (G.deck.length === 0) {
      const top = G.discardPile.pop();
      G.deck = shuffle([...G.discardPile]);
      G.discardPile = top ? [top] : [];
    }
    if (G.deck.length > 0) drawnCard = G.deck.pop();
  }

  // Animate card flying from pile to bot's card area
  const fromEl = fromDiscardPile
    ? document.getElementById('discard-drop-target')
    : document.getElementById('draw-pile-visual');
  const toEl = document.getElementById('opp-cards-' + bot.id);

  function afterDraw() {
    if (drawnCard) bot.hand.push(drawnCard);
    renderGame();

    // --- GO OUT CHECK ---
    if (G.phase !== 'lastTurns') {
      for (let i = 0; i < bot.hand.length; i++) {
        const remaining = bot.hand.filter((_, idx) => idx !== i);
        if (isValidHand(remaining)) {
          const goOutDiscard = bot.hand.splice(i, 1)[0];
          G.discardPile.push(goOutDiscard);
          bot.wentOut = true;
          bot.finishedLastTurn = true;
          G.lastTurnPlayer = G.currentTurn;
          G.phase = 'lastTurns';
          G.lastTurnCount = 0;
          showWentOut(bot.name);
          renderGame();
          setTimeout(beginLastTurns, 1500);
          return;
        }
      }
    }

    // --- DISCARD ---
    setTimeout(() => {
      const discardIdx = botChooseDiscard(bot.hand);
      const discarded = bot.hand.splice(discardIdx, 1)[0];

      const fromEl = document.getElementById('opp-cards-' + bot.id);
      const toEl   = document.getElementById('discard-drop-target');

      function afterDiscard() {
        G.discardPile.push(discarded);
        advanceTurn();
      }

      if (fromEl && toEl) {
        animateCardDraw(fromEl, toEl, true, discarded, afterDiscard);
      } else {
        afterDiscard();
      }
    }, 600);
  }

  if (fromEl && toEl && drawnCard) {
    animateCardDraw(fromEl, toEl, false, drawnCard, afterDraw);
  } else {
    afterDraw();
  }
}

function botWouldBenefit(hand, newCard) {
  // Check if newCard completes or helps a group
  const others = hand.filter(c => c.id !== newCard.id);
  for (let i = 0; i < others.length; i++) {
    for (let j = i + 1; j < others.length; j++) {
      if (isBook([newCard, others[i], others[j]]) || isRun([newCard, others[i], others[j]])) return true;
    }
  }
  return isWild(newCard);
}

function botChooseDiscard(hand) {
  // Score each card by how "useful" it is
  let worst = 0;
  let worstScore = -Infinity;
  
  hand.forEach((card, i) => {
    // Try removing this card and see how many complete groups remain
    const rest = hand.filter((_, idx) => idx !== i);
    const groupCount = countGroups(rest);
    const pts = isWild(card) ? -100 : cardValue(card.val); // wilds are valuable
    const score = pts - groupCount * 20;
    
    if (score > worstScore) {
      worstScore = score;
      worst = i;
    }
  });
  return worst;
}

function countGroups(cards) {
  if (cards.length < 3) return 0;
  let count = 0;
  const used = new Set();
  
  for (let i = 0; i < cards.length; i++) {
    if (used.has(i)) continue;
    for (let j = i + 1; j < cards.length; j++) {
      if (used.has(j)) continue;
      for (let k = j + 1; k < cards.length; k++) {
        if (used.has(k)) continue;
        if (isBook([cards[i], cards[j], cards[k]]) || isRun([cards[i], cards[j], cards[k]])) {
          used.add(i); used.add(j); used.add(k);
          count++;
          break;
        }
      }
      if (used.has(i)) break;
    }
  }
  return count;
}

// ========================
// END ROUND
// ========================
function endRound() {
  G.phase = 'roundEnd';
  
  G.players.forEach(p => {
    let roundScore = 0;
    if (p.wentOut) {
      roundScore = 0;
    } else {
      roundScore = scoreHand(p.hand);
    }
    p.score += roundScore;
    p.roundScores = p.roundScores || [];
    p.roundScores.push(roundScore);
  });

  // Don't auto-flip — each player flips their own cards to show,
  // then the host presses Continue when everyone is done reviewing.
  
  renderGame();

  // Style the continue button as the "next round" action but disable until
  // the host is ready — they just press Continue when done reviewing
  const continueBtn = document.getElementById('continue-btn');
  if (continueBtn) {
    continueBtn.disabled = false;
    continueBtn.textContent = G.round === 11 ? 'Results' : 'Next →';
    continueBtn.onclick = G.round === 11 ? showGameOver : nextRound;
    continueBtn.style.background = 'linear-gradient(135deg, #c8940a, #e8b420)';
    continueBtn.style.color = '#1a1a0a';
    continueBtn.style.animation = 'pulse-gold 1s ease-in-out infinite';
  }
  // Action area always visible — no display change needed
  const undoBtn = document.getElementById('undo-btn');
  const goOutBtn = document.getElementById('go-out-btn');
  if (undoBtn) undoBtn.style.display = 'none';
  if (goOutBtn) goOutBtn.style.display = 'none';
}

function scoreHand(hand) {
  // Find the grouping that minimises leftover points.
  // We try every combination of valid groups and score what's left over.
  let minScore = Infinity;

  function tryScore(remaining) {
    // Score all remaining cards as ungrouped
    const baseScore = remaining.reduce((sum, c) => {
      if (isWild(c)) return sum + 20;
      if (c.isJoker) return sum + 50;
      return sum + cardValue(c.val);
    }, 0);
    minScore = Math.min(minScore, baseScore);
    if (minScore === 0) return;

    // Try pulling out every valid group of 3+ and recursing on the rest
    for (let size = 3; size <= remaining.length; size++) {
      const combos = getCombinations(remaining, size);
      for (const combo of combos) {
        if (isBook(combo) || isRun(combo)) {
          const rest = remaining.filter(c => !combo.includes(c));
          tryScore(rest);
          if (minScore === 0) return;
        }
      }
    }
  }

  tryScore(hand);
  return minScore === Infinity ? 0 : minScore;
}

// showRoundEndModal removed — Continue button used instead

function getCardTextColor(card) {
  if (card.isJoker) return 'var(--joker)';
  if (isWild(card)) return 'var(--gold)';
  const map = { clubs: 'var(--green)', hearts: 'var(--red)', spades: '#1a1a1a', stars: 'var(--yellow)', diamonds: 'var(--blue)' };
  return map[card.suit] || '#333';
}

function nextRound() {
  // Reset continue button back to normal
  const continueBtn = document.getElementById('continue-btn');
  if (continueBtn) {
    continueBtn.textContent = 'Continue';
    continueBtn.onclick = confirmDiscard;
    continueBtn.style.background = '';
    continueBtn.style.color = '';
    continueBtn.style.animation = '';
  }
  const undoBtn = document.getElementById('undo-btn');
  const goOutBtn = document.getElementById('go-out-btn');
  if (undoBtn) undoBtn.style.display = '';
  if (goOutBtn) goOutBtn.style.display = '';
  // Advance starting player clockwise for next round
  G.startingPlayer = (G.startingPlayer + 1) % G.players.length;
  G.round++;
  if (G.round > 11) { showGameOver(); return; }
  startRound();
}

function showGameOver() {
  const modal = document.getElementById('game-over-modal');
  const content = document.getElementById('game-over-content');
  
  const sorted = [...G.players].sort((a, b) => a.score - b.score);
  const winner = sorted[0];
  
  let html = `<div style="text-align:center;margin-bottom:20px">
    <div style="font-size:48px">🏆</div>
    <div style="font-family:Cinzel;font-size:22px;color:var(--gold);letter-spacing:2px">${winner.name}</div>
    <div style="font-size:14px;color:rgba(255,255,255,0.5);margin-top:4px">WINS with ${winner.score} points!</div>
  </div>`;
  
  html += `<table class="score-table"><thead><tr>
    <th>Rank</th><th>Player</th><th>Total Score</th>
  </tr></thead><tbody>`;
  sorted.forEach((p, i) => {
    html += `<tr class="${i === 0 ? 'leader' : ''}">
      <td>${['🥇','🥈','🥉','4','5','6'][i]}</td>
      <td>${p.name}</td>
      <td>${p.score}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  
  content.innerHTML = html;
  modal.classList.add('show');
}

function restartGame() {
  closeModal('game-over-modal');
  G.players.forEach(p => { p.score = 0; p.roundScores = []; });
  G.round = 1;
  G.startingPlayer = 0;
  startRound();
  showScreen('game-screen');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

// ========================
// WENT OUT NOTIFICATION
// ========================
// ========================
// DRAW ANIMATION
// ========================
function animateCardDraw(fromEl, toEl, faceUp, cardData, callback) {
  const fromRect = fromEl.getBoundingClientRect();
  const toRect   = toEl.getBoundingClientRect();

  // Always use standard card dimensions so the flying card is
  // portrait regardless of the source element's shape
  const CARD_W = 70, CARD_H = 100;
  const startX = fromRect.left + fromRect.width  / 2 - CARD_W / 2;
  const startY = fromRect.top  + fromRect.height / 2 - CARD_H / 2;

  const flying = faceUp ? createCardElement(cardData, -1) : document.createElement('div');
  if (!faceUp) flying.className = 'card face-down';
  flying.style.cssText = `
    position: fixed;
    width: ${CARD_W}px;
    height: ${CARD_H}px;
    left: ${startX}px;
    top: ${startY}px;
    z-index: 9998;
    pointer-events: none;
    transition: none;
    border-radius: 7px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.55);
  `;
  document.body.appendChild(flying);
  flying.getBoundingClientRect(); // force reflow

  const dx = (toRect.left + toRect.width  / 2) - (startX + CARD_W / 2);
  const dy = (toRect.top  + toRect.height / 2) - (startY + CARD_H / 2);

  flying.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.8, 0.4, 1), opacity 0.6s ease';
  flying.style.transform = `translate(${dx}px, ${dy}px) scale(0.9)`;
  flying.style.opacity = '0.85';

  setTimeout(() => {
    flying.remove();
    callback();
  }, 500);
}


// ========================
// DRAG & DROP — Reorder hand
// ========================
let dragState = null;

function startDrag(e) {
  if (dragState) return;
  const touch = e.touches ? e.touches[0] : e;
  // Only the topmost card under the pointer should respond
  const topEl = document.elementFromPoint(touch.clientX, touch.clientY);
  if (topEl !== e.currentTarget && !e.currentTarget.contains(topEl)) return;

  const target = e.currentTarget;
  const isDrawn = target.getAttribute('data-drawn') === 'true';
  const sourceIdx = parseInt(target.getAttribute('data-idx'));
  const startX = touch.clientX;
  const startY = touch.clientY;

  function commitDrag(t) {
    const rect = target.getBoundingClientRect();
    const hand = document.getElementById('player-hand');

    const grabOffsetX = startX - rect.left;
    const grabOffsetY = startY - rect.top;

    target.style.position = 'fixed';
    target.style.width = rect.width + 'px';
    target.style.height = rect.height + 'px';
    target.style.left = rect.left + 'px';
    target.style.top = rect.top + 'px';
    target.style.transition = 'none';
    target.style.transformOrigin = 'top left';
    target.style.transform = 'none';
    target.style.margin = '0';

    const handCards = Array.from(hand.querySelectorAll('.card'));
    const origLeftEdges = handCards.map(c =>
      c === target ? rect.left : c.getBoundingClientRect().left
    );

    dragState = {
      sourceIdx,
      dropIdx: sourceIdx,
      isDrawn,
      element: target,
      grabOffsetX,
      grabOffsetY,
      origLeftEdges,
    };

    renderDragPreview();

    document.removeEventListener('mousemove', onPendingMove);
    document.removeEventListener('touchmove', onPendingMove);
    document.removeEventListener('mouseup', onPendingCancel);
    document.removeEventListener('touchend', onPendingCancel);

    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('touchmove', onDragMove, { passive: false });
    document.addEventListener('mouseup', onDragEnd);
    document.addEventListener('touchend', onDragEnd);
  }

  function onPendingMove(e) {
    const t = e.touches ? e.touches[0] : e;
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    if (Math.sqrt(dx * dx + dy * dy) > 6) {
      e.preventDefault();
      commitDrag(t);
    }
  }

  function onPendingCancel() {
    document.removeEventListener('mousemove', onPendingMove);
    document.removeEventListener('touchmove', onPendingMove);
    document.removeEventListener('mouseup', onPendingCancel);
    document.removeEventListener('touchend', onPendingCancel);
  }

  document.addEventListener('mousemove', onPendingMove);
  document.addEventListener('touchmove', onPendingMove, { passive: false });
  document.addEventListener('mouseup', onPendingCancel);
  document.addEventListener('touchend', onPendingCancel);
}

function renderDragPreview() {
  if (!dragState) return;
  const localPlayer = G.players[G.localPlayerIdx];
  const n = localPlayer.hand.length;
  const hand = document.getElementById('player-hand');
  const cards = Array.from(hand.querySelectorAll('.card'));
  const src = dragState.sourceIdx;
  const dst = dragState.dropIdx;

  // Build display order: remove src, insert at dst
  const order = [];
  for (let i = 0; i < n; i++) if (i !== src) order.push(i);
  order.splice(Math.min(dst, order.length), 0, src);

  const srcNewPos = order.indexOf(src);

  const CARD_W = 70;
  const maxWidth = window.innerWidth - 32;
  const step = n <= 1 ? CARD_W : Math.min(Math.round(CARD_W * 0.26), Math.floor((maxWidth - CARD_W) / (n - 1)));
  const ARC_R = 500;
  const angleDeg = 2;
  const startAngleDeg = -((n - 1) / 2) * angleDeg;

  order.forEach((origIdx, newPos) => {
    const card = cards[origIdx];
    if (!card) return;
    const θDeg = startAngleDeg + newPos * angleDeg;
    const θRad = θDeg * Math.PI / 180;
    const x = newPos * step;
    const yOffset = ARC_R - ARC_R * Math.cos(θRad);

    if (origIdx === src) {
      card.style.zIndex = srcNewPos + 1;
    } else {
      card.style.transition = 'left 0.15s ease, top 0.15s ease, transform 0.15s ease';
      card.style.left = x + 'px';
      card.style.top = yOffset + 'px';
      card.style.transform = `rotate(${θDeg}deg)`;
      card.style.zIndex = newPos >= srcNewPos ? newPos + 2 : newPos + 1;
    }
  });
}

function onDragMove(e) {
  if (!dragState) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  const { element, grabOffsetX, grabOffsetY } = dragState;

  // Move the actual card element to follow the finger
  element.style.left = (touch.clientX - grabOffsetX) + 'px';
  element.style.top  = (touch.clientY - grabOffsetY) + 'px';

  if (dragState.isDrawn) return;

  // Slot detection: compare ghost's left edge against original card left edges
  const edges = dragState.origLeftEdges;
  const n = edges.length;
  const ghostLeft = touch.clientX - grabOffsetX;

  let newDrop = n;
  for (let i = 0; i < n; i++) {
    if (ghostLeft < edges[i]) { newDrop = i; break; }
  }

  if (newDrop !== dragState.dropIdx) {
    dragState.dropIdx = newDrop;
    renderDragPreview();
  }
}

function onDragEnd(e) {
  if (!dragState) return;
  const { element } = dragState;

  // Restore the card to normal in-hand positioning before re-render
  element.style.position = '';
  element.style.left = '';
  element.style.top = '';
  element.style.width = '';
  element.style.height = '';
  element.style.transform = '';
  element.style.transformOrigin = '';
  element.style.transition = '';
  element.style.zIndex = '';
  element.style.margin = '';

  if (!dragState.isDrawn) {
    const localPlayer = G.players[G.localPlayerIdx];
    const { sourceIdx, dropIdx } = dragState;
    if (dropIdx !== sourceIdx) {
      const card = localPlayer.hand.splice(sourceIdx, 1)[0];
      localPlayer.hand.splice(Math.min(dropIdx, localPlayer.hand.length), 0, card);
    }
  }

  dragState = null;

  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  document.removeEventListener('touchend', onDragEnd);

  // If it's not our turn, only re-render the hand so we don't
  // stomp over ongoing bot animations or game state
  if (isMyTurn()) {
    renderGame();
  } else {
    renderPlayerHand();
  }
}

// ========================
// TOAST
// ========================
let toastTimeout = null;
function showToast(msg, duration = 2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.classList.remove('show'), duration);
}

// ========================
// WENT OUT NOTIFICATION
// ========================
function showWentOut(name) {
  const overlay = document.getElementById('went-out-overlay');
  const banner = document.getElementById('went-out-banner');
  banner.innerHTML = `${name}<br><span style="font-size:16px;opacity:0.7">went out! Last turns...</span>`;
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 2500);
}


// ========================
// INIT
// ========================
showScreen('home-screen');

// Make draw pile clickable even via JS
document.getElementById('draw-pile-visual').addEventListener('click', () => {
  if (isMyTurn() && G.drawnCard === null && (G.phase === 'draw' || G.phase === 'lastTurns') && !G.dealing) {
    drawFromDeck();
  }
});
